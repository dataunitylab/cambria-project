name: Publish site

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build demo
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: false
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'yarn'
    - name: Install dependencies
      run: yarn
    - name: Build distribution
      run: yarn build
    - name: Bundle demo
      run: yarn build-demo
    - name: Upload static files as artifact
      id: deployment
      uses: actions/upload-pages-artifact@v3
      with:
        path: demo/

  deploy:
    name: Deploy demo
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
